version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: supplyguard-postgres
    environment:
      POSTGRES_USER: supplyguard
      POSTGRES_PASSWORD: supplyguard
      POSTGRES_DB: supplyguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplyguard"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: supplyguard-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
