services:
  postgres:
    image: postgres:15-alpine
    container_name: supplyguard-postgres
    environment:
      POSTGRES_USER: supplyguard
      POSTGRES_PASSWORD: supplyguard
      POSTGRES_DB: supplyguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplyguard"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: supplyguard-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ml:
    build: ./ml
    container_name: supplyguard-ml
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/../data:ro
      - ./ml/models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  server:
    build: ./server
    container_name: supplyguard-server
    ports:
      - "3001:3001"
    env_file: .env.docker
    volumes:
      - ./data:/app/../data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml:
        condition: service_healthy

  client:
    build: ./client
    container_name: supplyguard-client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    depends_on:
      - server

volumes:
  pgdata:
